name: Flatpak
'on':
  push:
    branches:
    - develop
    - release-*
    tags-ignore:
    - '*'
    paths:
    - '**.cpp'
    - '**.h'
    - '**.java'
    - '**.ui'
    - flatpak/**
    - buildconfig/**
    - cmake/**
    - launcher/**
    - libraries/**
    - program_info/**
    - tests/**
    - CMakeLists.txt
    - COPYING.md
    - .github/workflows/flatpak.yml
  pull_request:
    paths:
    - '**.cpp'
    - '**.h'
    - '**.java'
    - '**.ui'
    - flatpak/**
    - buildconfig/**
    - cmake/**
    - launcher/**
    - libraries/**
    - program_info/**
    - tests/**
    - CMakeLists.txt
    - COPYING.md
    - .github/workflows/flatpak.yml
  workflow_dispatch: null
permissions:
  contents: read
jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-22.04
          arch: x86_64
        - os: ubuntu-latest
          arch: aarch64
    runs-on: ${{ matrix.os }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.8
      options: --privileged
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        submodules: true
    - name: Set short version
      shell: bash
      run: 'echo "VERSION=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

        '
    - name: Build Flatpak
      uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: PrismLauncher-${{ runner.os }}-${{ env.VERSION }}-Flatpak.flatpak
        manifest-path: flatpak/org.prismlauncher.PrismLauncher.yml
        arch: ${{ matrix.arch }}
